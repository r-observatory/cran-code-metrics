name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::RSQLite
            any::DBI
            any::jsonlite
            any::digest
            any::testthat
            any::withr
      - name: Install rpkg-analyzer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p "$HOME/.local/bin"
          gh release download v0.1.0 --repo r-observatory/rpkg-analyzer \
            --pattern 'rpkg-analyzer-linux-x86_64.tar.gz' --dir /tmp
          tar -xzf /tmp/rpkg-analyzer-linux-x86_64.tar.gz -C "$HOME/.local/bin"
          chmod +x "$HOME/.local/bin/rpkg-analyzer"
          echo "RPKG_ANALYZER_BIN=$HOME/.local/bin/rpkg-analyzer" >> "$GITHUB_ENV"
      - name: Run unit tests
        run: Rscript tests/testthat.R
