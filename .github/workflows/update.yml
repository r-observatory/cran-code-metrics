name: Update CRAN Code Metrics

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      force_full:
        description: "Re-analyze every package from scratch, ignoring the prior database."
        type: boolean
        default: false
      recollect:
        description: "Backfill packages whose rows predate the binary metrics, in place (no wipe)."
        type: boolean
        default: false
      time_budget_seconds:
        description: "Stop starting new shards after this many seconds (default 18000 = 5h)."
        default: "18000"

permissions:
  contents: write

concurrency:
  group: cran-code-metrics-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::RSQLite
            any::DBI
            any::jsonlite
            any::digest
            any::testthat
            any::withr

      - name: Install rpkg-analyzer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p "$HOME/.local/bin"
          gh release download v0.2.0 --repo r-observatory/rpkg-analyzer \
            --pattern 'rpkg-analyzer-linux-x86_64.tar.gz' --dir /tmp
          tar -xzf /tmp/rpkg-analyzer-linux-x86_64.tar.gz -C "$HOME/.local/bin"
          chmod +x "$HOME/.local/bin/rpkg-analyzer"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "RPKG_ANALYZER_BIN=$HOME/.local/bin/rpkg-analyzer" >> "$GITHUB_ENV"
          "$HOME/.local/bin/rpkg-analyzer" --sexp <(echo 'x <- 1') >/dev/null && echo "rpkg-analyzer ready"

      - name: Run unit tests
        run: Rscript tests/testthat.R

      - name: Download the latest databases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p out
          latest_tag() { gh release list --limit 1000 --json tagName -q '.[].tagName' | { grep "^$1-" || true; } | sort -r | head -1; }

          # A single consolidated release per day (metrics-YYYY-MM-DD) carries both
          # the code and data DBs as assets. Fall back to the legacy split code-/data-
          # tags on the first run after the consolidation so the in-flight bootstrap
          # (the prior code DB) is not lost.
          METRICS_TAG=$(latest_tag metrics)
          CODE_SRC="${METRICS_TAG:-$(latest_tag code)}"
          DATA_SRC="${METRICS_TAG:-$(latest_tag data)}"
          echo "prior metrics tag: ${METRICS_TAG:-none}; code src: ${CODE_SRC:-none}; data src: ${DATA_SRC:-none}"

          if [ -n "$CODE_SRC" ]; then
            gh release download "$CODE_SRC" --pattern cran-code-metrics.db --dir out 2>/dev/null || true
            gh release download "$CODE_SRC" --pattern code-manifest.json --dir out 2>/dev/null \
              || gh release download "$CODE_SRC" --pattern manifest.json --dir out 2>/dev/null || true
            [ -f out/code-manifest.json ] && mv out/code-manifest.json out/prev-code-manifest.json || true
            [ -f out/manifest.json ] && mv out/manifest.json out/prev-code-manifest.json || true
          fi
          if [ -n "$DATA_SRC" ]; then
            gh release download "$DATA_SRC" --pattern cran-data-metrics.db --dir out 2>/dev/null || true
            gh release download "$DATA_SRC" --pattern data-manifest.json --dir out 2>/dev/null \
              || gh release download "$DATA_SRC" --pattern manifest.json --dir out 2>/dev/null || true
            [ -f out/data-manifest.json ] && mv out/data-manifest.json out/prev-data-manifest.json || true
            [ -f out/manifest.json ] && mv out/manifest.json out/prev-data-manifest.json || true
          fi

          # Snapshot the pre-run package set so the release notes can tag
          # each changed package as new-to-the-catalog vs updated. Always
          # write the file (empty when there is no prior code DB) so the
          # renderer never has to special-case its absence.
          sqlite3 out/cran-code-metrics.db "SELECT DISTINCT package FROM cran_code_summary" > out/seed-packages.txt 2>/dev/null || : > out/seed-packages.txt

          echo "PREV_CODE_TAG=${CODE_SRC}" >> "$GITHUB_ENV"
          echo "PREV_DATA_TAG=${DATA_SRC}" >> "$GITHUB_ENV"
          ls -la out || true

      - name: Analyze shards and publish after each
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES_TITLE_PREFIX: CRAN
        run: |
          set -euo pipefail
          BUDGET="${{ inputs.time_budget_seconds || '18000' }}"
          FORCE=""; [ "${{ inputs.force_full }}" = "true" ] && FORCE="--bootstrap"
          RECOLLECT=""; [ "${{ inputs.recollect }}" = "true" ] && RECOLLECT="--recollect"
          TODAY="$(date -u +%Y-%m-%d)"
          METRICS_TAG="metrics-${TODAY}"
          MAX_BYTES=2040109465

          # Publish ONE dated release carrying both the code and data metrics DBs
          # (plus both manifests) as assets, with a single notes body. render_notes.R
          # writes the same catalog to release-notes-code.md/-data.md, so either is
          # the combined body; we attach the code one.
          publish_metrics() {
            local f bytes
            for f in cran-code-metrics.db cran-data-metrics.db; do
              bytes=$(stat -c%s "out/$f")
              if [ "$bytes" -gt "$MAX_BYTES" ]; then
                echo "::error::out/$f is ${bytes} bytes (> ${MAX_BYTES}); refusing to publish ${METRICS_TAG}."
                return 1
              fi
            done
            local assets=(out/cran-code-metrics.db out/cran-data-metrics.db out/code-manifest.json out/data-manifest.json)
            if gh release view "$METRICS_TAG" >/dev/null 2>&1; then
              # Today's release already exists (an earlier shard this run): clobber ONLY today.
              gh release upload "$METRICS_TAG" "${assets[@]}" --clobber
              gh release edit "$METRICS_TAG" --notes-file out/release-notes-code.md
            else
              gh release create "$METRICS_TAG" "${assets[@]}" \
                --title "CRAN Metrics - ${TODAY}" --notes-file out/release-notes-code.md --latest
            fi
          }

          shard=0
          while :; do
            shard=$((shard + 1))
            echo "=== shard ${shard} (elapsed ${SECONDS}s) ==="
            Rscript scripts/update.R out/ ${FORCE} ${RECOLLECT}
            FORCE=""

            CHANGED=$(jq -r '.changed' out/run-status.json)
            COMPLETE=$(jq -r '.bootstrap_complete' out/run-status.json)
            echo "shard ${shard}: changed=${CHANGED} complete=${COMPLETE} analyzed=$(jq -r .n_analyzed out/run-status.json)/$(jq -r .n_universe out/run-status.json)"

            if [ "$CHANGED" = "true" ]; then
              Rscript scripts/render_notes.R out/
              publish_metrics || exit 1
            fi

            if [ "$COMPLETE" = "true" ] || [ "$CHANGED" != "true" ]; then
              echo "Nothing left to do (complete=${COMPLETE}, changed=${CHANGED})."
              break
            fi
            [ "$SECONDS" -ge "$BUDGET" ] && { echo "Time budget reached."; break; }
          done

      - name: Prune old dated releases
        if: ${{ github.event_name == 'schedule' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP: "30"
        run: |
          set -euo pipefail
          # Prune only the consolidated metrics- series. Legacy code-/data- releases
          # are left untouched here and removed by a one-time cleanup once the new
          # scheme is confirmed.
          gh release list --limit 1000 --json tagName -q '.[].tagName' \
            | { grep "^metrics-" || true; } \
            | Rscript scripts/prune.R \
            | while read -r tag; do
                [ -n "$tag" ] || continue
                echo "pruning $tag"
                gh release delete "$tag" --yes --cleanup-tag || true
              done
